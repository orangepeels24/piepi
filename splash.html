<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:transparent;overflow:hidden;}
  body{display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;-webkit-app-region:drag;}

  .bg{position:absolute;inset:0;background:#060606;border-radius:20px;box-shadow:0 40px 100px rgba(0,0,0,.95);}

  /* Animated grid */
  .grid{position:absolute;inset:0;border-radius:20px;overflow:hidden;opacity:0;animation:grid-fade 1s ease .1s forwards;}
  .grid svg{width:100%;height:100%;}
  @keyframes grid-fade{to{opacity:1;}}

  /* Center stage */
  .stage{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:0;}

  /* Hex logo */
  .hex-wrap{position:relative;width:90px;height:90px;display:flex;align-items:center;justify-content:center;opacity:0;animation:hex-in .6s cubic-bezier(.34,1.56,.64,1) .4s forwards;}
  @keyframes hex-in{to{opacity:1;}}

  .hex-ring{position:absolute;inset:0;}
  .hex-ring svg{width:100%;height:100%;}
  .hex-path{stroke-dasharray:260;stroke-dashoffset:260;animation:draw-hex .8s ease .6s forwards;}
  @keyframes draw-hex{to{stroke-dashoffset:0;}}

  .hex-inner{width:62px;height:62px;background:#0f0f0f;border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .hex-inner::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.04),transparent 60%);}

  .logo-img{width:100%;height:100%;object-fit:cover;border-radius:14px;}
  .logo-fb{font-size:26px;position:relative;z-index:1;}

  /* Scan line */
  .scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);top:0;animation:scan-down 1.4s ease .8s both;}
  @keyframes scan-down{from{top:0;opacity:0;}20%{opacity:1;}to{top:100%;opacity:0;}}

  /* Orbit dots */
  .orbit{position:absolute;inset:-16px;animation:orbit-spin 8s linear infinite;}
  .orbit-dot{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff;opacity:.15;top:50%;left:50%;transform-origin:0 0;}
  .orbit-dot:nth-child(1){transform:rotate(0deg) translateX(53px) translateY(-2px);}
  .orbit-dot:nth-child(2){transform:rotate(120deg) translateX(53px) translateY(-2px);opacity:.08;}
  .orbit-dot:nth-child(3){transform:rotate(240deg) translateX(53px) translateY(-2px);opacity:.05;}
  @keyframes orbit-spin{to{transform:rotate(360deg);}}

  /* Name */
  .name-wrap{margin-top:20px;overflow:hidden;}
  .name{font-family:'DM Mono',monospace;font-size:11px;font-weight:400;letter-spacing:.55em;text-transform:uppercase;color:rgba(255,255,255,.85);
    display:flex;gap:0;
    opacity:0;transform:translateY(16px);
    animation:name-up .5s cubic-bezier(.34,1.2,.64,1) 1.1s forwards;}
  @keyframes name-up{to{opacity:1;transform:translateY(0);}}

  /* Tagline */
  .tagline{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.22em;text-transform:uppercase;margin-top:10px;
    opacity:0;animation:fade-in .4s ease 1.7s forwards;}

  /* Progress bar */
  .prog-wrap{margin-top:28px;width:80px;height:1px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;
    opacity:0;animation:fade-in .3s ease 2s forwards;}
  .prog-fill{height:100%;width:0;background:rgba(255,255,255,.5);border-radius:99px;animation:prog 1s ease 2.1s forwards;}
  @keyframes prog{0%{width:0;}40%{width:60%;}70%{width:80%;}100%{width:100%;}}

  @keyframes fade-in{to{opacity:1;}}

  /* Corner accents */
  .corner{position:absolute;width:12px;height:12px;opacity:0;animation:fade-in .4s ease .3s forwards;}
  .corner.tl{top:16px;left:16px;border-top:1px solid rgba(255,255,255,.12);border-left:1px solid rgba(255,255,255,.12);}
  .corner.tr{top:16px;right:16px;border-top:1px solid rgba(255,255,255,.12);border-right:1px solid rgba(255,255,255,.12);}
  .corner.bl{bottom:16px;left:16px;border-bottom:1px solid rgba(255,255,255,.12);border-left:1px solid rgba(255,255,255,.12);}
  .corner.br{bottom:16px;right:16px;border-bottom:1px solid rgba(255,255,255,.12);border-right:1px solid rgba(255,255,255,.12);}

  /* Version tag */
  .ver-tag{position:absolute;bottom:22px;right:22px;font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.12);letter-spacing:.1em;
    opacity:0;animation:fade-in .4s ease 2s forwards;}
</style>
</head>
<body>
<div class="bg"></div>

<!-- Grid background -->
<div class="grid">
  <svg viewBox="0 0 520 400" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
        <stop offset="0%" stop-color="#060606" stop-opacity="0"/>
        <stop offset="100%" stop-color="#060606" stop-opacity="1"/>
      </radialGradient>
    </defs>
    <!-- Vertical lines -->
    <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
      <line x1="40" y1="0" x2="40" y2="400"/><line x1="80" y1="0" x2="80" y2="400"/>
      <line x1="120" y1="0" x2="120" y2="400"/><line x1="160" y1="0" x2="160" y2="400"/>
      <line x1="200" y1="0" x2="200" y2="400"/><line x1="240" y1="0" x2="240" y2="400"/>
      <line x1="280" y1="0" x2="280" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
      <line x1="360" y1="0" x2="360" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
      <line x1="440" y1="0" x2="440" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/>
    </g>
    <!-- Horizontal lines -->
    <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
      <line x1="0" y1="40" x2="520" y2="40"/><line x1="0" y1="80" x2="520" y2="80"/>
      <line x1="0" y1="120" x2="520" y2="120"/><line x1="0" y1="160" x2="520" y2="160"/>
      <line x1="0" y1="200" x2="520" y2="200"/><line x1="0" y1="240" x2="520" y2="240"/>
      <line x1="0" y1="280" x2="520" y2="280"/><line x1="0" y1="320" x2="520" y2="320"/>
      <line x1="0" y1="360" x2="520" y2="360"/>
    </g>
    <!-- Vignette overlay -->
    <rect x="0" y="0" width="520" height="400" fill="url(#vignette)"/>
  </svg>
</div>

<!-- Corner accents -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Main stage -->
<div class="stage">
  <div class="hex-wrap">
    <!-- Animated hex outline -->
    <div class="hex-ring">
      <svg viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="hex-path" d="M45 4 L82 24 L82 66 L45 86 L8 66 L8 24 Z"
          stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <!-- Orbit -->
    <div class="orbit">
      <div class="orbit-dot"></div>
      <div class="orbit-dot"></div>
      <div class="orbit-dot"></div>
    </div>
    <!-- Inner box -->
    <div class="hex-inner">
      <div class="scan"></div>
      <img class="logo-img" src="logo.jpg" alt="Piepi"
           onerror="this.style.display='none';document.querySelector('.logo-fb').style.display='flex'"/>
      <div class="logo-fb" style="display:none">🐍</div>
    </div>
  </div>

  <div class="name-wrap">
    <div class="name">P&nbsp;I&nbsp;E&nbsp;P&nbsp;I</div>
  </div>
  <div class="tagline">Python Package Manager</div>
  <div class="prog-wrap"><div class="prog-fill"></div></div>
</div>

<div class="ver-tag">v1.0.0</div>

</body>
</html>
